# Database centralizzato link affiliati FPV Italia
# REGOLA: cambia il link QUI e si aggiorna su TUTTI gli articoli
# Categorie: radiocomandi, occhiali, vtx, riceventi, fc, esc, motori, frame, batterie, accessori
#
# LINK / NEGOZI:
#   amazon_it: "..."   -> bottone Amazon (campo storico)
#   aliexpress: "..."  -> bottone AliExpress (campo storico)
#   negozi:            -> N negozi extra (drone24hours, chinahobbyline, geprc, ...)
#     drone24hours: "https://..."
#     geprc: "https://..."
# Il primo link diventa il bottone "pieno", gli altri bottoni secondari.
#
# TAG AFFILIATE AUTOMATICHE: basta incollare il link PULITO al prodotto. In base
# al dominio, il sito aggiunge da solo i parametri affiliati (vedi AFFILIATE_RULES
# in src/utils/prodotti.ts):
#   amazon.it        -> tag=fpvitalia-21
#   drone24hours.com -> sca_ref + utm (UpPromote)
#   chinahobbyline / stonehobby / geprc / sub250 -> ref=fpvitalia (GoAffPro)
# Se il link ha già quel parametro, non viene sovrascritto. AliExpress e gli short
# link (amzn.to) restano come li incolli (sono già affiliati).

